services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pstock}
      POSTGRES_USER: ${POSTGRES_USER:-pstock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pstock}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_SSL: ${DATABASE_SSL:-no}
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  client_frontend:
    build:
      context: ./frontend_client
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_BASE_URL: ${API_BASE_URL:-http://web:3000}
    depends_on:
      web:
        condition: service_started
    ports:
      - "3002:3000"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      DATABASE_SSL: ${DATABASE_SSL:-no}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh","-c","node migrations/run.js && node bot/index.js"]
    restart: unless-stopped

volumes:
  pgdata:
